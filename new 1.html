<html>
<head>
<title>10-D</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Courier New", monospace;
    font-weight: bold;
    text-transform: uppercase;
    background: #f4f8ff;
}

nav {
    background: #0b1f4d;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 30px;
    position: sticky;
    top: 0;
}

.logo img {
    width: 80px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 15px;
}

nav ul li a {
    display: block;
    color: white;
    text-decoration: none;
    font-size: 14px;
    padding: 14px 16px;
    position: relative;
    transition: 0.3s ease;
}

nav ul li a::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 6px;
    width: 0;
    height: 3px;
    background: #ffd700;
    transform: translateX(-50%);
    transition: width 0.3s ease;
    border-radius: 10px;
}

nav ul li a:hover {
    color: #ffd700;
}

nav ul li a:hover::after {
    width: 70%;
}

@media (max-width: 768px) {
    nav {
        flex-direction: column;
        text-align: center;
    }

    nav ul {
        flex-direction: column;
        width: 100%;
    }
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.card {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 18px;
    width: 320px;
    padding: 15px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    margin-right: 15px;
}

.card-title {
    font-size: 18px;
    color: #0b1f4d;
    margin-bottom: 5px;
}

.card-description {
    font-size: 12px;
    color: #555;
    margin-bottom: 10px;
}

.card button {
    padding: 7px 12px;
    border: none;
    border-radius: 10px;
    background: #0b1f4d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.card button:hover {
    background: #ffd700;
    color: #0b1f4d;
}
</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="https://www.nsdaps.edu.ph/assets/img/nsdaps.png">
    </div>

    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#subjects">Subjects</a></li>
        <li><a href="#gospel">Gospel Reflection</a></li>
        <li><a href="#prayer">Prayer Corner</a></li>
        <li><a href="#stewardship">Stewardship</a></li>
        <li><a href="#announcements">Announcements</a></li>
    </ul>
</nav>

<div class="container">

    <div class="card">
        <img src="https://www.nsdaps.edu.ph/assets/img/nsdaps.png">
        <div>
            <h2 class="card-title">Math</h2>
            <p class="card-description">Solving Equations</p>
        </div>
    </div>

    <div class="card">
        <img src="https://www.nsdaps.edu.ph/assets/img/nsdaps.png">
        <div>
            <h2 class="card-title">Science</h2>
            <p class="card-description">Explore Experiments</p>
        </div>
    </div>

    <div class="card">
        <img src="https://www.nsdaps.edu.ph/assets/img/nsdaps.png">
        <div>
            <h2 class="card-title">English</h2>
            <p class="card-description">Grammar & Writing</p>
        </div>
    </div>

    <div class="card">
        <img src="https://www.nsdaps.edu.ph/assets/img/nsdaps.png">
        <div>
            <h2 class="card-title">Filipino</h2>
            <p class="card-description">Wika at Panitikan</p>
        </div>
    </div>

</div>

</body>
</html>
